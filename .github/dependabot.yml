version: 2
updates:
  # Frontend npm dependencies
  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
      day: monday
      time: '08:00'
    assignees:
      - Ejirowebfi
    reviewers:
      - Ejirowebfi
    open-pull-requests-limit: 10
    groups:
      minor-and-patch:
        patterns:
          - '*'
        update-types:
          - minor
          - patch
    labels:
      - dependencies
      - javascript

  # Rust / Cargo dependencies
  - package-ecosystem: cargo
    directory: /contracts
    schedule:
      interval: weekly
      day: monday
      time: '08:00'
    assignees:
      - Ejirowebfi
    reviewers:
      - Ejirowebfi
    open-pull-requests-limit: 5
    groups:
      minor-and-patch:
        patterns:
          - '*'
        update-types:
          - minor
          - patch
    labels:
      - dependencies
      - rust

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '08:00'
    assignees:
      - Ejirowebfi
    reviewers:
      - Ejirowebfi
    open-pull-requests-limit: 5
    groups:
      minor-and-patch:
        patterns:
          - '*'
        update-types:
          - minor
          - patch
    labels:
      - dependencies
      - github-actions
